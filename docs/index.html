<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>Spark Plug Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#1E0D06;color:#f2f2f4;font-family:-apple-system,Helvetica,sans-serif;
display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:24px;box-sizing:border-box;}
.wrap{max-width:560px;}
h1{font-size:2.2rem;margin-bottom:8px;}
.accent{color:#FF5C39;}
p{color:#b9b9c2;line-height:1.5;}
.badge{display:inline-block;margin-top:24px;padding:10px 20px;border:1px solid #FF5C39;border-radius:24px;color:#FF5C39;text-decoration:none;}
footer{margin-top:40px;font-size:0.8rem;color:#6d6d76;}
a{color:#FF5C39;}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #4FB0AE55 0%, #4FB0AE00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head><body>
<div class="orb"></div>
<div class="wrap">
<h1>Spark Plug Log</h1>
<p class="accent">Track spark plug replacement intervals by mileage.</p>
<p>Replacement date and mileage log — free. Upgrade for plug gap/type notes with multi-cylinder tracking.</p>

<footer><a href="privacy.html">Privacy</a> &nbsp;·&nbsp; <a href="terms.html">Terms</a></footer>
</div></body></html>
