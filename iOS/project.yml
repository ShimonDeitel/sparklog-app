name: SparkPlugLog
options:
  bundleIdPrefix: com.shimondeitel.sparklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SparkPlugLog:
    type: application
    platform: iOS
    sources:
      - path: SparkPlugLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sparklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SparkPlugLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SparkPlugLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SparkPlugLogTests
      - path: SparkPlugLog.storekit
    dependencies:
      - target: SparkPlugLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sparklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SparkPlugLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SparkPlugLogUITests
    dependencies:
      - target: SparkPlugLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sparklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SparkPlugLog:
    build:
      targets:
        SparkPlugLog: all
        SparkPlugLogTests: [test]
        SparkPlugLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SparkPlugLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SparkPlugLog.storekit
      targets:
        - SparkPlugLogTests
        - SparkPlugLogUITests
    archive:
      config: Release
